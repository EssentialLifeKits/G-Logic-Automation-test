<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — G-Logic Automation</title>
    <meta name="description"
        content="Sign in to G-Logic Automation to schedule, plan, and automate your Instagram content." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="index.css" />
</head>

<body>
    <div class="auth-page">
        <!-- Ambient glow effects -->
        <div class="auth-glow auth-glow-1"></div>
        <div class="auth-glow auth-glow-2"></div>

        <div class="auth-container">
            <!-- Logo -->
            <div class="auth-logo">
                <img src="./logo.jpg" alt="Logo" class="logo-icon custom-logo-img" />
                <span>G-Logic Automation</span>
            </div>

            <!-- Pulsing Orb -->
            <div class="pulsing-orb-container">
                <div class="pulsing-orb"></div>
            </div>

            <!-- Heading -->
            <h1 class="auth-title">Welcome to G-Logic Automation</h1>
            <p class="auth-subtitle">Streamline your content strategy and automate your growth.</p>

            <!-- Error message area -->
            <div class="auth-error" id="authError" role="alert"></div>

            <!-- Sign In Form -->
            <form class="auth-form" id="authForm" novalidate>
                <div class="auth-field">
                    <label for="authEmail">Email</label>
                    <input type="email" id="authEmail" placeholder="you@example.com" autocomplete="email" required />
                </div>
                <div class="auth-field">
                    <label for="authPassword">Password</label>
                    <input type="password" id="authPassword" placeholder="Enter your password"
                        autocomplete="current-password" required />
                </div>

                <button type="submit" class="auth-btn auth-btn-primary" id="signInBtn">
                    <span class="auth-btn-text">Sign In</span>
                    <span class="auth-btn-loader" id="signInLoader"></span>
                </button>
            </form>

            <!-- Divider -->
            <div class="auth-divider">
                <span>or</span>
            </div>

            <!-- Google Sign In -->
            <button class="auth-btn auth-btn-google" id="googleSignInBtn" type="button">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                Sign in with Google
            </button>

            <!-- Bottom links -->
            <div class="auth-links">
                <a href="#" class="auth-link" id="lostPasswordLink">Lost Password?</a>
                <span class="auth-links-dot">·</span>
                <a href="#" class="auth-link" id="createAccountLink">Create Account</a>
            </div>

            <!-- Set New Password (shown only during password recovery flow) -->
            <div id="resetPasswordSection" style="display:none; width:100%;">
                <h2 style="font-size:1.1rem; font-weight:700; color:var(--text-primary); margin-bottom:16px; text-align:center;">Set New Password</h2>
                <div class="auth-field">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password (min 6 chars)" autocomplete="new-password" />
                </div>
                <div class="auth-field">
                    <label for="confirmNewPassword">Confirm Password</label>
                    <input type="password" id="confirmNewPassword" placeholder="Confirm new password" autocomplete="new-password" />
                </div>
                <button type="button" class="auth-btn auth-btn-primary" id="updatePasswordBtn">
                    Set New Password
                </button>
            </div>
        </div>

        <!-- Decorative bottom badge -->
        <p class="auth-footer">Trusted by creators who plan ahead ✨</p>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="auth.js"></script>
</body>

</html>
